<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banners | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--primary:#1a1a2e;--accent:#e94560;--bg:#f0f2f5;--white:#fff;--sidebar-w:260px;--text:#2d2d2d;--muted:#888;--border:#e5e7eb;--success:#27ae60;--error:#e74c3c;--info:#3498db;--warning:#f39c12}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:var(--bg);display:flex;min-height:100vh}
        .sidebar{width:var(--sidebar-w);background:var(--primary);min-height:100vh;position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:100}
        .sidebar-brand{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px}
        .logo-dot{width:10px;height:10px;background:var(--accent);border-radius:50%}
        .sidebar-brand span{color:white;font-size:1.2rem;font-weight:700}
        .sidebar-brand small{color:rgba(255,255,255,0.4);font-size:0.7rem;display:block}
        .sidebar-nav{flex:1;padding:16px 0;overflow-y:auto}
        .nav-section{padding:8px 20px 4px;color:rgba(255,255,255,0.3);font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:1px}
        .nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;color:rgba(255,255,255,0.65);text-decoration:none;font-size:0.88rem;font-weight:500;transition:all 0.2s;margin:2px 8px;border-radius:10px}
        .nav-item:hover{background:rgba(255,255,255,0.08);color:white}
        .nav-item.active{background:var(--accent);color:white}
        .nav-item .icon{font-size:1.1rem;width:20px;text-align:center}
        .sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08)}
        .sidebar-user{display:flex;align-items:center;gap:10px}
        .user-avatar{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:0.9rem}
        .user-info span{color:white;font-size:0.85rem;font-weight:600;display:block}
        .user-info small{color:rgba(255,255,255,0.4);font-size:0.72rem}
        .logout-btn{margin-left:auto;background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;font-size:1rem}
        .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column}
        .topbar{background:var(--white);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
        .page-title h1{font-size:1.3rem;font-weight:700;color:var(--primary)}
        .page-title p{font-size:0.8rem;color:var(--muted);margin-top:2px}
        .btn{padding:9px 18px;border-radius:10px;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
        .btn-primary{background:var(--accent);color:white}
        .btn-primary:hover{background:#c73652}
        .btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
        .btn-sm{padding:6px 12px;font-size:0.78rem}
        .btn-danger{background:#fdeaea;color:var(--error);border:none}
        .btn-success{background:#e8f8f0;color:var(--success);border:none}
        .content{padding:28px;flex:1}
        .banners-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
        .banner-card{background:var(--white);border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow:hidden;transition:transform 0.2s}
        .banner-card:hover{transform:translateY(-3px)}
        .banner-img{width:100%;height:160px;object-fit:cover;background:#f3f4f6;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:2rem}
        .banner-img img{width:100%;height:100%;object-fit:cover}
        .banner-body{padding:18px}
        .banner-title{font-weight:700;font-size:0.95rem;color:var(--primary);margin-bottom:6px}
        .banner-sub{font-size:0.8rem;color:var(--muted);margin-bottom:12px}
        .banner-actions{display:flex;gap:8px;flex-wrap:wrap}
        .badge{padding:4px 10px;border-radius:20px;font-size:0.72rem;font-weight:600}
        .badge-success{background:#e8f8f0;color:var(--success)}
        .badge-secondary{background:#f3f4f6;color:var(--muted)}
        .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center}
        .modal-overlay.open{display:flex}
        .modal{background:white;border-radius:20px;padding:32px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
        .modal h3{font-size:1.1rem;font-weight:700;color:var(--primary);margin-bottom:20px}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:6px}
        .form-control{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:0.88rem;color:var(--text);outline:none;transition:border-color 0.2s}
        .form-control:focus{border-color:var(--accent)}
        .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
        .empty-state{text-align:center;padding:60px;color:var(--muted)}
        .empty-state .icon{font-size:3rem;margin-bottom:12px}
        .toast{position:fixed;top:20px;right:20px;background:var(--success);color:white;padding:12px 22px;border-radius:12px;font-size:0.88rem;font-weight:600;z-index:999;display:none}
        .toast.error{background:var(--error)}
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-brand"><div class="logo-dot"></div><div><span>ShopEase</span><small>Admin Panel</small></div></div>
    <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <a href="/admin/dashboard.html" class="nav-item"><span class="icon">📊</span> Dashboard</a>
        <div class="nav-section">Catalog</div>
        <a href="/admin/products.html" class="nav-item"><span class="icon">📦</span> Products</a>
        <a href="/admin/categories.html" class="nav-item"><span class="icon">🏷️</span> Categories</a>
        <a href="/admin/banners.html" class="nav-item active"><span class="icon">🖼️</span> Banners</a>
        <div class="nav-section">Sales</div>
        <a href="/admin/orders.html" class="nav-item"><span class="icon">🛒</span> Orders</a>
        <a href="/admin/coupons.html" class="nav-item"><span class="icon">🎟️</span> Coupons</a>
        <div class="nav-section">Customers</div>
        <a href="/admin/users.html" class="nav-item"><span class="icon">👥</span> Users</a>
        <a href="/admin/reviews.html" class="nav-item"><span class="icon">⭐</span> Reviews</a>
        <div class="nav-section">Support</div>
        <a href="/admin/support.html" class="nav-item"><span class="icon">🎫</span> Support</a>
        <a href="/admin/returns.html" class="nav-item"><span class="icon">↩️</span> Returns</a>
        <div class="nav-section">Content</div>
        <a href="/admin/blogs.html" class="nav-item"><span class="icon">📝</span> Blogs</a>
    </nav>
    <div class="sidebar-footer">
        <div class="sidebar-user">
            <div class="user-avatar" id="adminAvatar">A</div>
            <div class="user-info"><span id="adminName">Admin</span><small>Administrator</small></div>
            <button class="logout-btn" onclick="logout()">🚪</button>
        </div>
    </div>
</aside>
 
<div class="main">
    <div class="topbar">
        <div class="page-title">
            <h1>🖼️ Banners</h1>
            <p>Manage homepage and promotional banners</p>
        </div>
        <div>
            <button class="btn btn-primary" onclick="openModal()">+ Add Banner</button>
        </div>
    </div>
    <div class="content">
        <div id="bannersGrid" class="banners-grid">
            <div class="empty-state"><div class="icon">⏳</div><p>Loading banners...</p></div>
        </div>
    </div>
</div>
 
<!-- Modal -->
<div class="modal-overlay" id="bannerModal">
    <div class="modal">
        <h3 id="modalTitle">Add Banner</h3>
        <input type="hidden" id="editId">
        <div class="form-group">
            <label>Title *</label>
            <input type="text" class="form-control" id="bannerTitle" placeholder="Banner title">
        </div>
        <div class="form-group">
            <label>Subtitle</label>
            <input type="text" class="form-control" id="bannerSubtitle" placeholder="Short description">
        </div>
        <div class="form-group">
            <label>Image URL *</label>
            <input type="text" class="form-control" id="bannerImage" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Link URL</label>
            <input type="text" class="form-control" id="bannerLink" placeholder="/shop or external URL">
        </div>
        <div class="form-group">
            <label>Display Order</label>
            <input type="number" class="form-control" id="bannerOrder" placeholder="1" min="1">
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveBanner()">Save Banner</button>
        </div>
    </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
const API='/api';
function getToken(){return localStorage.getItem('token')||sessionStorage.getItem('token')}
function getUserName(){return localStorage.getItem('userName')||sessionStorage.getItem('userName')}
function logout(){localStorage.clear();sessionStorage.clear();window.location.href='/login.html'}
function showToast(msg,error=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(error?' error':'');t.style.display='block';setTimeout(()=>t.style.display='none',3000)}
async function apiFetch(url,opts={}){const res=await fetch(API+url,{headers:{'Content-Type':'application/json','Authorization':'Bearer '+getToken()},...opts});if(res.status===401){logout();return null}try{return await res.json()}catch{return null}}
 
function initAdmin(){
    if(!getToken()){window.location.href='/login.html';return}
    const name=getUserName()||'Admin';
    document.getElementById('adminName').textContent=name;
    document.getElementById('adminAvatar').textContent=name[0].toUpperCase();
}
 
async function loadBanners(){
    const data=await apiFetch('/admin/banners');
    const banners=Array.isArray(data)?data:(data?.data||[]);
    const grid=document.getElementById('bannersGrid');
    if(!banners.length){grid.innerHTML=`<div class="empty-state"><div class="icon">🖼️</div><p>No banners yet. Add your first banner!</p></div>`;return}
    grid.innerHTML=banners.map(b=>`
        <div class="banner-card">
            <div class="banner-img">${b.imageUrl?`<img src="${b.imageUrl}" alt="${b.title}" onerror="this.parentElement.textContent='🖼️'">`:'🖼️'}</div>
            <div class="banner-body">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
                    <div class="banner-title">${b.title||'Untitled'}</div>
                    <span class="badge ${b.active?'badge-success':'badge-secondary'}">${b.active?'Active':'Inactive'}</span>
                </div>
                <div class="banner-sub">${b.subtitle||b.description||''}</div>
                <div class="banner-actions">
                    <button class="btn btn-sm btn-secondary" onclick="editBanner(${JSON.stringify(b).replace(/"/g,'&quot;')})">✏️ Edit</button>
                    ${b.active
                        ?`<button class="btn btn-sm btn-secondary" onclick="toggleBanner(${b.id},false)">⏸️ Deactivate</button>`
                        :`<button class="btn btn-sm btn-success" onclick="toggleBanner(${b.id},true)">▶️ Activate</button>`
                    }
                    <button class="btn btn-sm btn-danger" onclick="deleteBanner(${b.id})">🗑️</button>
                </div>
            </div>
        </div>
    `).join('');
}
 
function openModal(){document.getElementById('bannerModal').classList.add('open');document.getElementById('modalTitle').textContent='Add Banner';document.getElementById('editId').value='';['bannerTitle','bannerSubtitle','bannerImage','bannerLink','bannerOrder'].forEach(id=>document.getElementById(id).value='')}
function closeModal(){document.getElementById('bannerModal').classList.remove('open')}
function editBanner(b){
    document.getElementById('bannerModal').classList.add('open');
    document.getElementById('modalTitle').textContent='Edit Banner';
    document.getElementById('editId').value=b.id;
    document.getElementById('bannerTitle').value=b.title||'';
    document.getElementById('bannerSubtitle').value=b.subtitle||b.description||'';
    document.getElementById('bannerImage').value=b.imageUrl||'';
    document.getElementById('bannerLink').value=b.linkUrl||b.link||'';
    document.getElementById('bannerOrder').value=b.displayOrder||b.order||'';
}
 
async function saveBanner(){
    const id=document.getElementById('editId').value;
    const body={title:document.getElementById('bannerTitle').value,subtitle:document.getElementById('bannerSubtitle').value,imageUrl:document.getElementById('bannerImage').value,linkUrl:document.getElementById('bannerLink').value,displayOrder:document.getElementById('bannerOrder').value||1};
    if(!body.title||!body.imageUrl){showToast('Title and Image URL are required',true);return}
    const url=id?`/admin/banners/update/${id}`:'/admin/banners/add';
    const method=id?'PUT':'POST';
    const res=await apiFetch(url,{method,body:JSON.stringify(body)});
    if(res){showToast(id?'Banner updated!':'Banner added!');closeModal();loadBanners()}else showToast('Failed to save banner',true);
}
 
async function toggleBanner(id,activate){
    const url=activate?`/admin/banners/activate/${id}`:`/admin/banners/deactivate/${id}`;
    await apiFetch(url,{method:'PUT'});
    showToast(activate?'Banner activated!':'Banner deactivated!');
    loadBanners();
}
 
async function deleteBanner(id){
    if(!confirm('Delete this banner?'))return;
    await apiFetch(`/admin/banners/delete/${id}`,{method:'DELETE'});
    showToast('Banner deleted');loadBanners();
}
 
document.getElementById('bannerModal').addEventListener('click',e=>{if(e.target===document.getElementById('bannerModal'))closeModal()});
document.addEventListener('DOMContentLoaded',()=>{initAdmin();loadBanners()});
</script>
</body>
</html>
